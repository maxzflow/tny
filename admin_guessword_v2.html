<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าเกมทายคำ V2 (ตัวเลข)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; margin: 0; background: transparent !important; }
        
        .char-selector-area { margin-top: 10px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; flex-wrap: wrap; gap: 8px; min-height: 60px; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .char-btn { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 1.4rem; min-width: 45px; text-align: center; user-select: none; transition: 0.2s; line-height: 1.2; font-weight:600;}
        .char-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .char-btn.is-hidden { background: rgba(255, 94, 58, 0.2); color: var(--primary); border-color: var(--primary); box-shadow: 0 4px 10px rgba(255,94,58,0.2); }
        
        /* Checkbox Switch Style */
        .switch-row { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 14px; }
        input[type="checkbox"] { width: 24px; height: 24px; cursor: pointer; accent-color: var(--primary); }
    </style>
</head>
<body class="glass-theme">
    <header class="page-header">
        <h1>ตั้งค่าเกมทายคำ V2 (ตัวเลข)</h1>
        <p>กำหนดคำถาม คำตอบ และนาฬิกาจับเวลา</p>
    </header>

    <div class="admin-layout">
        <!-- Card 1: Theme Settings -->
        <div class="bento-panel">
            <h3><i class="bi bi-palette-fill"></i> ธีมสีพื้นหลัง</h3>
            <div class="bento-row">
                <div class="input-group">
                    <label>สีที่ 1 (ซ้าย)</label>
                    <input type="color" id="bg-color1" class="premium-color premium-input" value="#000000">
                </div>
                <div class="input-group">
                    <label>สีที่ 2 (ขวา)</label>
                    <input type="color" id="bg-color2" class="premium-color premium-input" value="#1a1a1a">
                </div>
            </div>
            <button class="premium-btn btn-secondary" onclick="saveTheme(4)"><i class="bi bi-check-circle"></i> บันทึกสี</button>
        </div>

        <!-- Card 2: Timer Settings -->
        <div class="bento-panel">
            <h3><i class="bi bi-stopwatch"></i> เวลาและการเล่น</h3>
            <div class="switch-row" style="margin-bottom: 10px;">
                <span style="font-size:1.05rem; color: #fff; font-weight:600;">เปิดใช้งานเวลา</span>
                <input type="checkbox" id="is_timer_enabled" checked onchange="toggleTimerSettings()">
            </div>
            <div id="timer-settings">
                <div class="bento-row">
                    <div class="input-group">
                        <label>รูปแบบ</label>
                        <select id="fmt" onchange="toggleFormat()" class="premium-select">
                            <option value="seconds">วินาที (60)</option>
                            <option value="digital">นาฬิกา (01:00)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>เวลาเริ่มต้น</label>
                        <input type="text" id="t-display" class="premium-input">
                        <input type="hidden" id="t-real"> 
                    </div>
                </div>
            </div>
        </div>

        <!-- Card 3: Game Data -->
        <div class="bento-panel wide">
            <h3><i class="bi bi-pencil-square"></i> ตั้งค่าคำถามและเฉลย</h3>
            
            <div class="input-group" style="margin-bottom: 15px;">
                <label>1. คำถาม</label>
                <input type="text" id="q" placeholder="พิมพ์คำถาม..." class="premium-input">
            </div>

            <div class="input-group" style="margin-bottom: 15px;">
                <label style="display:flex; justify-content:space-between; align-items:center;">
                    <span>2. เฉลยคำตอบ</span>
                    <button style="background:transparent; border:none; color:var(--primary); cursor:pointer; font-weight:600;" onclick="generateButtons()"><i class="bi bi-arrow-clockwise"></i> อัปเดตตัวอักษร</button>
                </label>
                <input type="text" id="a" oninput="generateButtons()" class="premium-input">
            </div>

            <div class="input-group" style="margin-bottom: 20px;">
                <label>3. คลิกที่ตัวอักษรเพื่อซ่อน (จะเปลี่ยนเป็นตัวเลขในเกม)</label>
                <div class="char-selector-area" id="chars"></div>
                <input type="hidden" id="p">
            </div>

            <div class="bento-row">
                <button class="premium-btn btn-primary" style="flex:2;" onclick="saveData()"><i class="bi bi-floppy-fill"></i> บันทึกข้อมูล</button>
                <button class="premium-btn" style="flex:1; background: #FF7B00; color: #000; border: 2px solid #000; font-weight: bold;" onclick="triggerReveal()"><i class="bi bi-eye-fill"></i> เฉลย</button>
                <a href="game_guessword_v2.html" target="_blank" class="premium-btn btn-secondary" style="flex:1; text-decoration:none; padding: 12px 10px;"><i class="bi bi-rocket-takeoff-fill"></i> เปิดเกม</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="firebase_config.js"></script>
    <script>
        // Check Login Status
        checkAuth();

        database.ref('game_guessword_v2').once('value').then(snapshot => {
            renderEditor(snapshot.val());
        });

        function renderEditor(data) {
            if(!data) return;
            document.getElementById('q').value = data.question || '';
            document.getElementById('a').value = data.answer || '';
            document.getElementById('p').value = data.puzzle || '';
            
            // ตั้งค่านาฬิกา
            const isEnabled = (data.is_timer_enabled == 1);
            document.getElementById('is_timer_enabled').checked = isEnabled;
            
            document.getElementById('fmt').value = data.timer_format || 'digital';
            const timerVal = data.timer || 60;
            document.getElementById('t-real').value = timerVal;
            
            toggleTimerSettings(); // โชว์/ซ่อน เมนูเวลา
            toggleFormat(); // อัปเดตช่องเวลา
            
            setTimeout(() => { generateButtons(data.puzzle); }, 100);
        }

        function toggleTimerSettings() {
            const isEnabled = document.getElementById('is_timer_enabled').checked;
            const settingsDiv = document.getElementById('timer-settings');
            if (isEnabled) {
                settingsDiv.style.opacity = '1';
                settingsDiv.style.pointerEvents = 'auto';
            } else {
                settingsDiv.style.opacity = '0.3';
                settingsDiv.style.pointerEvents = 'none';
            }
        }

        function toggleFormat() {
            const fmt = document.getElementById('fmt').value;
            const realVal = document.getElementById('t-real').value;
            const inputDisplay = document.getElementById('t-display');
            if(fmt === 'digital') {
                inputDisplay.value = secondsToMmSs(realVal);
                inputDisplay.placeholder = "00:00";
            } else {
                inputDisplay.value = realVal;
                inputDisplay.placeholder = "60";
            }
        }

        function secondsToMmSs(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function parseToSeconds(val) {
            if (String(val).includes(':')) {
                const parts = val.split(':');
                return (parseInt(parts[0]) * 60) + parseInt(parts[1]);
            }
            return parseInt(val) || 60;
        }

        function generateButtons(loadedPuzzle = null) {
            const answerInput = document.getElementById('a');
            const charContainer = document.getElementById('chars');
            const puzzleInput = document.getElementById('p');
            const fullText = answerInput.value;
            if (loadedPuzzle === undefined) puzzleInput.value = ""; 
            charContainer.innerHTML = ''; 

            let chars = [];
            if (window.Intl && Intl.Segmenter) {
                const segmenter = new Intl.Segmenter('th', { granularity: 'grapheme' });
                chars = Array.from(segmenter.segment(fullText)).map(s => s.segment);
            } else { chars = fullText.split(''); }
            
            let puzzleChars = loadedPuzzle ? loadedPuzzle.split(' ') : [];

            chars.forEach((char, charIdx) => {
                const btn = document.createElement('div');
                btn.className = 'char-btn';
                btn.innerText = char;
                if (loadedPuzzle && puzzleChars.length === chars.length && puzzleChars[charIdx] === '_') {
                    btn.classList.add('is-hidden'); btn.innerText = '_';
                }
                btn.onclick = () => {
                    btn.classList.toggle('is-hidden');
                    btn.innerText = btn.classList.contains('is-hidden') ? '_' : char;
                    updatePuzzleValue(); 
                };
                charContainer.appendChild(btn);
            });
            updatePuzzleValue();
        }

        function updatePuzzleValue() {
            const btns = document.getElementById('chars').getElementsByClassName('char-btn');
            document.getElementById('p').value = Array.from(btns).map(b => b.innerText).join(' ');
        }

        function saveData() {
            updatePuzzleValue();
            const displayVal = document.getElementById('t-display').value;
            const finalSec = parseToSeconds(displayVal);
            
            const payload = {
                question: document.getElementById('q').value,
                answer: document.getElementById('a').value,
                puzzle: document.getElementById('p').value,
                timer: finalSec,
                timer_format: document.getElementById('fmt').value,
                is_timer_enabled: document.getElementById('is_timer_enabled').checked ? 1 : 0
            };

            database.ref('game_guessword_v2').set(payload).then(() => {
                alert('บันทึกเรียบร้อย!');
            });
        }
        
        function triggerReveal() {
            database.ref('game_commands/guessword_v2').set({
                action: 'reveal_all',
                timestamp: Date.now()
            }).then(() => {
                alert('ส่งคำสั่งเฉลยไปที่หน้าจอเกมแล้ว!');
            });
        }
        
        function saveTheme(id) {
            const c1=document.getElementById('bg-color1').value;
            const c2=document.getElementById('bg-color2').value;
            database.ref(`game_theme/${id}`).update({
                color1: c1,
                color2: c2,
                direction: 'to right'
            }).then(()=>alert('บันทึกธีมเรียบร้อย'));
        }
        database.ref('game_theme/4').once('value').then(snapshot => {
            const d = snapshot.val();
            if(d){ 
                if(d.color1) document.getElementById('bg-color1').value = d.color1; 
                if(d.color2) document.getElementById('bg-color2').value = d.color2; 
            }
        });
    </script>
    <script src="toast.js"></script>
</body>
</html>
