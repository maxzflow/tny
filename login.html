<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Zifo Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Kanit', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #1a1a1a; padding: 40px; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; }
        h2 { color: #c49a6c; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; font-family: 'Kanit', sans-serif;}
        button { width: 100%; padding: 12px; background: #c49a6c; color: #000; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
        button:hover { background: #fff; }
        .error { color: #dc3545; margin-bottom: 15px; display: none; }
        .register-link { margin-top: 15px; display: block; color: #c49a6c; text-decoration: none; font-size: 0.9rem; cursor: pointer; }
        .register-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 id="form-title">🔐 ผู้ดูแลระบบ</h2>
        <div id="error-msg" class="error">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
        <form id="login-form">
            <input type="email" id="email" placeholder="อีเมล" required>
            <input type="password" id="password" placeholder="รหัสผ่าน" required>
            <button type="submit" id="submit-btn">เข้าสู่ระบบ</button>
        </form>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="firebase_config.js"></script>

    <script>
        let isLoginMode = true;
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleMode = document.getElementById('toggleMode');
        const errorMsg = document.getElementById('error-msg');

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorMsg.style.display = 'none';

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    errorMsg.innerText = "อีเมลหรือรหัสผ่านไม่ถูกต้อง";
                    errorMsg.style.display = 'block';
                });
        });
    </script>
</body>
</html>
