<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyan Cat Production Timer</title>
    <style>
        body {
            background-color: #050520;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* ส่วนของทางวิ่งแมว */
        #track {
            width: 80%;
            height: 100px;
            border-bottom: 2px dashed #444;
            position: relative;
            margin-bottom: 50px;
        }

        #nyan-cat {
            position: absolute;
            bottom: 10px;
            left: 0%; /* ขยับตามเวลา */
            transition: left 1s linear;
            display: flex;
            align-items: center;
        }

        /* ตัวแทนแมว (Pixel Art Placeholder) */
        #cat-body {
            width: 60px;
            height: 40px;
            background: #ffcc99;
            border-radius: 5px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 10px;
            color: black;
        }

        /* สายรุ้ง */
        #rainbow {
            height: 30px;
            width: 1000px; /* ยาวเผื่อไว้ */
            background: linear-gradient(to bottom, red, orange, yellow, green, blue, purple);
            position: absolute;
            right: 60px;
            opacity: 0.7;
        }

        /* ส่วนควบคุม */
        .controls {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        #timer-display {
            font-size: 4rem;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #ff00ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .custom-panel {
            margin-top: 20px;
        }

        .skin-btn {
            background: #444;
            font-size: 12px;
            margin: 0 5px;
        }
    </style>
</head>
<body>

    <h1>NYAN COUNTDOWN PRO</h1>

    <div id="track">
        <div id="nyan-cat">
            <div id="rainbow"></div>
            <div id="cat-body">CAT</div>
        </div>
    </div>

    <div class="controls">
        <div id="timer-display">00:00</div>
        <input type="number" id="minutes" placeholder="นาที" style="width: 60px; padding: 5px;">
        <button onclick="startTimer()">START</button>

        <div class="custom-panel">
            <p>ปรับแต่งแมว:</p>
            <button class="skin-btn" onclick="changeSkin('#ffcc99', 'ORIGINAL')">Original</button>
            <button class="skin-btn" onclick="changeSkin('#00ffff', 'SPACE')">Space</button>
            <button class="skin-btn" onclick="changeSkin('#ff5555', 'ZOMBIE')">Zombie</button>
        </div>
    </div>

    <script>
        let timeLeft;
        let totalTime;
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            const mins = document.getElementById('minutes').value;
            if (!mins) return;

            timeLeft = mins * 60;
            totalTime = timeLeft;

            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                updateCatPosition();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Time is up! 🐱✨");
                }
            }, 1000);
        }

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer-display').innerText = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateCatPosition() {
            const progress = ((totalTime - timeLeft) / totalTime) * 100;
            document.getElementById('nyan-cat').style.left = progress + "%";
        }

        function changeSkin(color, text) {
            const cat = document.getElementById('cat-body');
            cat.style.backgroundColor = color;
            cat.innerText = text;
        }
    </script>
</body>
</html>
