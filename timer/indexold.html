<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Nyan Cat Timer</title>
    <style>
        body { background-color: #003366; overflow: hidden; margin: 0; color: white; font-family: monospace; }
        
        #timer-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; }
        #time-display { font-size: 8rem; text-shadow: 4px 4px 0px #000; font-weight: bold; }
        
        #cat-wrapper { position: absolute; top: 40%; left: 0; transition: left 0.1s linear; width: 150px; }
        #nyan-cat { width: 100%; }
        #rainbow { position: absolute; right: 100px; top: 25px; height: 50px; width: 2000px; background: linear-gradient(to bottom, red, orange, yellow, green, blue, purple); z-index: -1; opacity: 0.7; }
        
        #pigeon-msg { position: fixed; top: -200px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 20px 40px; border-radius: 20px; font-size: 2rem; transition: top 0.5s; z-index: 100; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #pigeon-msg.show { top: 100px; }
        
        .star { position: absolute; background: white; width: 2px; height: 2px; opacity: 0.8; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    <script>
        for(let i=0; i<50; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random()*100+'vw';
            s.style.top = Math.random()*100+'vh';
            document.body.appendChild(s);
        }
    </script>

    <div id="timer-container">
        <div id="time-display">00:00</div>
        <div id="status-text">WAITING...</div>
    </div>

    <div id="cat-wrapper">
        <div id="rainbow"></div>
        <img id="nyan-cat" src="https://media.tenor.com/2roX3uxz_68AAAAi/cat-space.gif">
    </div>

    <div id="pigeon-msg">🕊️ <span id="msg-text">ข้อความ</span></div>

    <script>
        // ✅ Config ที่ถูกต้อง (ไม่มี import แล้ว)
        const firebaseConfig = {
            apiKey: "AIzaSyAVABCnzhVs8G6s7R7BS-Az5EN6HZsYp4Q",
            authDomain: "timer-38e22.firebaseapp.com",
            projectId: "timer-38e22",
            storageBucket: "timer-38e22.firebasestorage.app",
            messagingSenderId: "188072585975",
            appId: "1:188072585975:web:1c81b3c0e66035a52c41f2",
            measurementId: "G-X62TZ7CY90",
            // ลิงก์ Asia ที่ถูกต้อง
            databaseURL: "https://timer-38e22-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        // เริ่มต้นระบบ
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const timerDisplay = document.getElementById('time-display');
        const catWrapper = document.getElementById('cat-wrapper');
        const catImg = document.getElementById('nyan-cat');
        const msgEl = document.getElementById('pigeon-msg');
        let interval;

        // ฟังคำสั่งจาก Database
        db.ref('timer').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // สกิน
            if (data.skin === 'zombie') {
                catImg.src = "https://media.tenor.com/images/335805a5078a6341a0279619e99c372a/tenor.gif";
                document.body.style.backgroundColor = "#2b2b2b";
            } else {
                catImg.src = "https://media.tenor.com/2roX3uxz_68AAAAi/cat-space.gif";
                document.body.style.backgroundColor = "#003366";
            }

            // ข้อความ
            if (data.message && data.message.show) {
                document.getElementById('msg-text').innerText = data.message.text;
                msgEl.classList.add('show');
            } else {
                msgEl.classList.remove('show');
            }

            // เวลา
            if (data.status === 'RUNNING') {
                document.getElementById('status-text').innerText = "";
                clearInterval(interval);
                interval = setInterval(() => {
                    const now = Date.now();
                    const timeLeft = data.endTime - now;

                    if (timeLeft <= 0) {
                        timerDisplay.innerText = "00:00";
                        catWrapper.style.left = "90%";
                        document.getElementById('status-text').innerText = "TIME'S UP!";
                        return;
                    }

                    const m = Math.floor(timeLeft / 60000);
                    const s = Math.floor((timeLeft % 60000) / 1000);
                    timerDisplay.innerText = `${m}:${s.toString().padStart(2,'0')}`;
                    
                    const progress = ((data.duration - timeLeft) / data.duration) * 90;
                    catWrapper.style.left = progress + "%";
                }, 100);
            } else {
                clearInterval(interval);
                document.getElementById('status-text').innerText = "PAUSED";
            }
        });
    </script>
</body>
</html>
